site_name: agent-scaffold
site_description: Generate runnable AI agent projects from markdown specs in the agent-deployments repo.
site_url: https://jagguvarma15.github.io/agent-scaffold/
repo_url: https://github.com/jagguvarma15/agent-scaffold
repo_name: jagguvarma15/agent-scaffold
edit_uri: edit/main/docs/
strict: true

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences

nav:
  - Home: index.md
  - Getting started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
      - Interactive shell: getting-started/interactive-shell.md
  - Guides:
      - Configuration: guides/configuration.md
      - Content sources: guides/content-sources.md
      - Project lifecycle: guides/project-lifecycle.md
      - Credentials: guides/credentials.md
      - Troubleshooting: guides/troubleshooting.md
  - Reference:
      - CLI commands: reference/cli.md
      - REPL commands: reference/repl.md
      - Recipe format: reference/recipes.md
      - Target languages: reference/languages.md
  - Internals:
      - Step orchestrator: design/orchestrator.md
      - Security model: design/security.md
