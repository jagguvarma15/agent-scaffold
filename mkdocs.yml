site_name: Agent Scaffold CLI
site_description: Generate runnable AI agent projects from markdown specs in the agent-deployments repo.
site_url: https://jagguvarma15.github.io/agent-scaffold/
repo_url: https://github.com/jagguvarma15/agent-scaffold
repo_name: jagguvarma15/agent-scaffold
edit_uri: edit/main/docs/
strict: true

theme:
  name: material
  favicon: assets/favicon.svg
  icon:
    logo: material/hammer-wrench
  # Brand colors come from the CLI banner and are defined in
  # stylesheets/extra.css (primary = tomato navbar, accent = orange).
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Getting started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
      - Interactive shell: getting-started/interactive-shell.md
  - How it works:
      - The ecosystem: ecosystem.md
      - Capabilities: capabilities.md
      - Content sources: guides/content-sources.md
  - Commands:
      - CLI commands: reference/cli.md
      - Shell commands: reference/repl.md
  - Guides:
      - Configuration: guides/configuration.md
      - Project lifecycle: guides/project-lifecycle.md
      - Credentials: guides/credentials.md
      - Troubleshooting: guides/troubleshooting.md
  - Reference:
      - Recipe format: reference/recipes.md
      - Target languages: reference/languages.md
  - Internals:
      - Step orchestrator: design/orchestrator.md
      - Security model: design/security.md
