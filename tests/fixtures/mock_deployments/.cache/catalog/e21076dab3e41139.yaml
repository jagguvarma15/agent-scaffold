    cost_budget_usd_per_day: 2.0
    tools:
    - event_bus_consumer
  - name: eligibility
    role_kind: router
    description: Apply auto-rebook policy rules (tier, time window, customer history) to dispatch the case along one of three terminal paths (rebook / notify host only / decline).
    model_hint: sonnet
    model_fallbacks:
    - sonnet
    - haiku
    cost_budget_usd_per_day: 5.0
    tools:
    - policy_lookup
    - customer_lookup
  - name: search
    role_kind: worker
    description: Query alternative slots across reservation platforms (Resy, OpenTable, Toast) and rank candidates.
    model_hint: opus
    model_fallbacks:
    - haiku
    cost_budget_usd_per_day: 3.0
    tools:
    - resy_adapter
    - opentable_adapter
    - toast_adapter
  - name: notifier
    role_kind: notifier
    description: Compose and send rebooking offers via email/SMS; record customer acceptance back to the case.
    model_hint: haiku
    model_fallbacks:
    - haiku
    cost_budget_usd_per_day: 1.5
    tools:
    - email_send
    - sms_send
