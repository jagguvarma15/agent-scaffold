frameworks:
- id: claude_agent_sdk_python
  language: python
  path: docs/frameworks/claude-agent-sdk.md
  package: claude-agent-sdk
  versions:
    minimum: 0.2.0
    last_known_good: 0.2.90
    notes: 0.2.x is the current line. API surface still evolving — pin tight and re-verify on every minor bump.
  extra_packages:
  - name: anthropic
    minimum: 0.69.0
- id: claude_agent_sdk_typescript
  language: typescript
  path: docs/frameworks/claude-agent-sdk-typescript.md
  package: '@anthropic-ai/claude-agent-sdk'
  versions:
    minimum: ^0.3.0
    last_known_good: 0.3.163
    notes: 0.3.x is the current line. API surface still evolving — pin tight and re-verify on every minor bump. Semver runs independently from the Python package.
- id: crewai
  language: python
  path: docs/frameworks/crewai.md
  package: crewai
  versions:
    minimum: '>=0.70.0'
    last_known_good: 0.70.0
    notes: '>=0.70.0 is the floor at which the kwargs-only `Crew()` constructor + the split-out memory module are stable; older drops break in unobvious ways.'
- id: langchain
  language: python
  path: docs/frameworks/langchain.md
  package: langchain
  versions:
    minimum: 0.3.0
    last_known_good: 0.3.18
    notes: 0.3.x consolidated agents under langchain.agents; earlier versions split between langchain and langchain-experimental. >=0.4 may break the tool decorator surface — pin tight.
  extra_packages:
  - name: langchain-anthropic
    minimum: 0.2.0
  - name: langchain-core
    minimum: 0.3.0
- id: langgraph
  language: python
  path: docs/frameworks/langgraph.md
  package: langgraph
  versions:
    minimum: 0.3.21
    last_known_good: 0.3.21
    notes: 0.3.x is the recipe-validated floor; pin tight because the checkpointer + prebuilt agent surface still shifts between minors.
- id: mastra
  language: typescript
  path: docs/frameworks/mastra.md
  package: '@mastra/core'
  versions:
    minimum: ^0.1.0
    last_known_good: 0.1.0
    notes: Pre-1.0 line; the ^0.1.0 floor unlocks the agents + workflows + memory triad recipes assume, but the surface still moves between minors. Pin tight.
- id: pydantic_ai
  language: python
  path: docs/frameworks/pydantic-ai.md
  package: pydantic-ai
  versions:
    minimum: '>=0.1.0'
    last_known_good: 0.1.0
    notes: The >=0.1.0 floor is what stabilizes the agent + `output_type` (renamed from `result_type`) surface the recipes rely on; treat the 0.0.x line as legacy.
- id: vercel_ai_sdk
  language: typescript
  path: docs/frameworks/vercel-ai-sdk.md
  package: ai
  versions:
    minimum: ^4.0.0
    last_known_good: 4.0.0
    notes: The ^4.0.0 major rewrote `streamText` / `generateText` / `generateObject` and is the recipe-validated line; 3.x is incompatible, 5.x untested.
  extra_packages:
  - name: '@ai-sdk/anthropic'
    minimum: ^1.0.0
