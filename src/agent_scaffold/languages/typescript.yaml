language: typescript
package_manager: pnpm
# Injected into generated package.json when the model omits the field
# (contract.normalize_package_manager). corepack resolves an UNPINNED manager
# to its latest release at image-build time, so a fresh pnpm major that needs
# a newer Node builtin breaks every `RUN pnpm install` on an older base image
# (seen live: pnpm 11 on node:20 -> ERR_UNKNOWN_BUILTIN_MODULE).
package_manager_pin: "pnpm@10.33.0"
project_layout: src
entry_point: src/index.ts
manifest: package.json
required_tools:
  formatter: prettier
  type_checker: tsc
  test: vitest
default_port: 3000
pinned_dependencies:
  "@anthropic-ai/sdk": "^0.30.0"
  zod: "^3.23.0"
  dotenv: "^16.4.0"
# Framework version pins live in `agent-deployments/docs/frameworks/<id>.md`
# YAML frontmatter (single source of truth). The scaffold reads them via
# `agent_scaffold.framework_versions.load_framework_versions(...)`.
forbidden:
  - "do not use CommonJS; use ESM"
  - "do not use any; use proper types or unknown"
  - "do not use console.log for app logging; use pino"
smoke_check: "pnpm exec tsx -e \"import('./src/index.ts').then(m => console.log('ok'))\""
