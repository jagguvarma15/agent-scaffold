language: python
package_manager: uv
project_layout: src
entry_point: src/{project_name}/main.py
manifest: pyproject.toml
required_tools:
  formatter: ruff
  type_checker: mypy
  test: pytest
default_port: 8000
pinned_dependencies:
  anthropic: ">=0.39.0"
  pydantic: ">=2.7.0"
  python-dotenv: ">=1.0.1"
# Framework version pins live in `agent-deployments/docs/frameworks/<id>.md`
# YAML frontmatter (single source of truth). The scaffold reads them via
# `agent_scaffold.framework_versions.load_framework_versions(...)`.
forbidden:
  - "do not use requirements.txt; use pyproject.toml"
  - "do not use print() for logging; use structlog"
  - "do not pin Python below 3.11"
smoke_check: "uv run python -c 'from {project_name}.main import agent; print(\"ok\")'"
